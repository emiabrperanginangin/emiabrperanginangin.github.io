<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bhumi Historia</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --primary: #5d4037;
    --secondary: #b8860b;
    --bg: #efebe9;
}

body {
    margin: 0;
    background: var(--bg);
    font-family: Arial, sans-serif;
}

/* HERO */
.hero {
    height: 450px;
    background-size: cover;
    background-position: center;
    position: relative;
}

.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.hero-content {
    position: relative;
    z-index: 2;
}

/* CARD */
.card:hover {
    transform: translateY(-5px);
    transition: 0.3s;
}

/* PAGE */
.page {
    display: none;
}
#home {
    display: block;
}

/* MOBILE */
@media(max-width:768px){
    .hero{height:300px;}
    .hero h1{font-size:1.8rem;}
}
</style>
</head>

<body>

<!-- NAVBAR (FIXED BOOTSTRAP) -->
<nav class="navbar navbar-expand-lg" style="background: var(--primary); padding:15px 8%;">
<div class="container-fluid">

<a class="navbar-brand text-white fw-bold" onclick="showPage('home')">
<i class="fas fa-landmark"></i> BHUMI HISTORIA
</a>

<button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-end" id="navbarNav">
<ul class="navbar-nav">
<li class="nav-item"><a class="nav-link text-light" onclick="showPage('home')">BERANDA</a></li>
<li class="nav-item"><a class="nav-link text-light" onclick="showPage('collection')">KOLEKSI</a></li>
<li class="nav-item"><a class="nav-link text-light" onclick="showPage('event')">EVENT</a></li>
<li class="nav-item"><a class="nav-link text-light" onclick="showPage('aboutadmin')">PROFIL</a></li>
<li class="nav-item"><a class="nav-link text-light" onclick="showPage('aboutus')">ABOUT</a></li>
</ul>

<button onclick="showPage('login')" class="btn ms-3" style="background:var(--secondary); color:white;">
MASUK
</button>
</div>

</div>
</nav>

<!-- HOME -->
<div id="home" class="page">

<div class="hero d-flex align-items-center justify-content-center text-center text-white" id="hero-bg">
<div class="hero-content">
<h1 class="text-warning">Bhumi Historia</h1>
<p>"Menghidupkan Kembali Jejak Leluhur"</p>

<div class="input-group mt-3">
<input type="text" class="form-control" placeholder="Cari...">
<button class="btn" style="background:var(--primary);color:white">Cari</button>
</div>
</div>
</div>

<div class="container py-5">
<h2 class="text-center mb-4">Koleksi Unggulan</h2>

<div class="row">

<div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">
<div class="card">
<img src="https://khastara.perpusnas.go.id/uploads/opac/koleksi_digital_default.jpg" class="card-img-top">
<div class="card-body text-center">
<h6>Bijvoegsel tot het staatsblad...</h6>
<small>3/8/2017</small>
</div>
</div>
</div>

<div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">
<div class="card">
<img src="https://khastara.perpusnas.go.id/uploads/opac/koleksi_digital_default.jpg" class="card-img-top">
<div class="card-body text-center">
<h6>The Asiatic Journal...</h6>
<small>3/13/2012</small>
</div>
</div>
</div>

</div>
</div>

</div>

<!-- EVENT -->
<div id="event" class="page">
<div class="container py-5">
<h2 class="text-center mb-4">Event</h2>

<div class="row">
<div class="col-md-6 col-lg-4 mb-4">
<div class="card p-3">
<h5>Pameran Naskah Melayu</h5>
<p>Zoom Meeting</p>
</div>
</div>
</div>

</div>
</div>

<!-- LOGIN -->
<div id="login" class="page">
<div class="container py-5">
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card p-4">
<h3 class="text-center">Login</h3>
<input class="form-control my-2" placeholder="Email">
<input class="form-control my-2" type="password" placeholder="Password">
<button class="btn btn-dark w-100">MASUK</button>
</div>
</div>
</div>
</div>
</div>

<!-- WA BUTTON -->
<a href="https://wa.me/6282274070591" class="btn btn-success rounded-circle"
style="position:fixed;bottom:20px;right:20px;">
<i class="fab fa-whatsapp"></i>
</a>

<!-- FOOTER -->
<footer class="text-center text-white p-4" style="background:var(--primary)">
<p>© Bhumi Historia 2026</p>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
}

// HERO SLIDER
const images = [
'https://images.unsplash.com/photo-1524995997946-a1c2e315a42f',
'https://images.unsplash.com/photo-1507842217343-583bb7270b66'
];

let i=0;
setInterval(()=>{
document.getElementById('hero-bg').style.backgroundImage=`url(${images[i]})`;
i=(i+1)%images.length;
},4000);
</script>

</body>
</html>
